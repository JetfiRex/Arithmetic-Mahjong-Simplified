name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: /usr/local/lib/android/sdk
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            build-essential \
            ccache \
            cmake \
            git \
            libffi-dev \
            libncurses5 \
            libncursesw5 \
            libltdl-dev \
            libssl-dev \
            libtinfo5 \
            libtool \
            openjdk-17-jdk \
            pkg-config \
            unzip \
            zip \
            zlib1g-dev

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install buildozer "cython<3.0"

      - name: Prepare Android SDK
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          fi
          if [ ! -x "$SDKMANAGER" ]; then
            echo "sdkmanager not found under ANDROID_HOME=$ANDROID_HOME"
            find "$ANDROID_HOME" -name sdkmanager -type f -print || true
            exit 1
          fi
          yes | "$SDKMANAGER" --sdk_root="$ANDROID_HOME" --licenses
          "$SDKMANAGER" --sdk_root="$ANDROID_HOME" \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "build-tools;37.0.0" \
            "ndk;28.2.13676358"
          find "$ANDROID_HOME/build-tools" -maxdepth 2 -name aidl -type f -print
          mkdir -p "$ANDROID_HOME/tools/bin"
          ln -sf "$SDKMANAGER" "$ANDROID_HOME/tools/bin/sdkmanager"
          mkdir -p "$HOME/.buildozer/android/platform"
          rm -rf "$HOME/.buildozer/android/platform/android-sdk"
          ln -s "$ANDROID_HOME" "$HOME/.buildozer/android/platform/android-sdk"
          rm -rf "$HOME/.buildozer/android/platform/android-ndk-r28c"
          ln -s "$ANDROID_HOME/ndk/28.2.13676358" "$HOME/.buildozer/android/platform/android-ndk-r28c"
          ls -la "$HOME/.buildozer/android/platform/android-sdk/tools/bin"
          ls -la "$HOME/.buildozer/android/platform"

      - name: Build debug APK
        env:
          ANDROIDSDK: ${{ env.ANDROID_HOME }}
          ANDROIDNDK: ${{ env.ANDROID_HOME }}/ndk/28.2.13676358
          ANDROIDAPI: "34"
          ANDROIDMINAPI: "23"
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          spec_path = Path("buildozer.spec")
          spec = spec_path.read_text(encoding="utf-8")
          android_header = "[android]\n"
          sdk_config = (
              f"{android_header}"
              f"android.sdk_path = {os.environ['ANDROID_HOME']}\n"
              f"android.ndk_path = {os.environ['ANDROID_HOME']}/ndk/28.2.13676358\n"
          )
          spec = spec.replace(android_header, sdk_config, 1)
          spec_path.write_text(spec, encoding="utf-8")
          PY
          sed -n '/^\[android\]/,/^\[/p' buildozer.spec
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: suanshu-mahjong-debug-apk
          path: bin/*.apk
          if-no-files-found: error
