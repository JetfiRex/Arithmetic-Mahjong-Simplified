name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            build-essential \
            ccache \
            cmake \
            git \
            libffi-dev \
            libncurses5 \
            libncursesw5 \
            libltdl-dev \
            libssl-dev \
            libtinfo5 \
            libtool \
            openjdk-17-jdk \
            pkg-config \
            unzip \
            zip \
            zlib1g-dev

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install buildozer "cython<3.0"

      - name: Build debug APK
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: suanshu-mahjong-debug-apk
          path: bin/*.apk
          if-no-files-found: error
